<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভাতঘর হোটেল মাসিক রিপোর্ট</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Hind Siliguri',sans-serif; }
table { border-collapse: collapse; width: 100%; }
th, td { border:1px solid #ccc; padding:4px; text-align:center; }
.text-staff { background-color:#dbeafe; color:#1e3a8a; padding:2px 4px; border-radius:4px; }
.text-rent { background-color:#ede9fe; color:#5b21b6; padding:2px 4px; border-radius:4px; }
.warning { color:red; font-weight:bold; }
</style>
</head>
<body class="bg-slate-200 p-4">

<h1 class="text-2xl font-black text-red-700 text-center mb-4">ভাতঘর হোটেল মাসিক রিপোর্ট</h1>

<div class="mb-4 flex gap-2 items-center no-print">
  <label class="font-bold">মাস:</label>
  <input type="month" id="monthInput" class="border p-2 rounded">
  <button id="loadBtn" class="bg-blue-600 text-white px-3 py-1 rounded">লোড করুন</button>
  <button id="exportBtn" class="bg-emerald-600 text-white px-3 py-1 rounded">Export CSV</button>
</div>

<table class="bg-white">
<thead>
<tr>
  <th>তারিখ</th>
  <th>বিবরণ</th>
  <th>টাকা</th>
  <th>ধরণ</th>
</tr>
</thead>
<tbody id="reportBody">
<tr><td colspan="4">লোড করার জন্য মাস নির্বাচন করুন</td></tr>
</tbody>
<tfoot>
<tr class="font-bold bg-slate-200">
  <td colspan="2">মোট</td>
  <td id="totalAmount">০</td>
  <td></td>
</tr>
</tfoot>
</table>

<div class="mt-4">
  <p class="font-bold">মাসিক সারসংক্ষেপ:</p>
  <p>মোট বিক্রয়: <span id="monthIncome">০</span></p>
  <p>মোট খরচ: <span id="monthExpense">০</span></p>
  <p>মোট স্টাফ বেতন: <span id="monthSalary" class="text-staff">০</span></p>
  <p>মোট দোকান ভাড়া: <span id="monthRent" class="text-rent">০</span></p>
  <p>লাভ: <span id="monthProfit">০</span></p>
  <p id="warningSalary" class="warning"></p>
  <p id="warningRent" class="warning"></p>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {getDatabase,ref,onValue} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",authDomain:"vatghor-ledger-81366.firebaseapp.com",databaseURL:"https://vatghor-ledger-81366-default-rtdb.firebaseio.com",projectId:"vatghor-ledger-81366",storageBucket:"vatghor-ledger-81366.appspot.com",messagingSenderId:"639005808868",appId:"1:639005808868:web:aa77be07aaa0264fd8f4f1"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const monthInput=document.getElementById("monthInput");
const reportBody=document.getElementById("reportBody");
const totalAmount=document.getElementById("totalAmount");
const monthIncome=document.getElementById("monthIncome");
const monthExpense=document.getElementById("monthExpense");
const monthSalary=document.getElementById("monthSalary");
const monthRent=document.getElementById("monthRent");
const monthProfit=document.getElementById("monthProfit");
const warningSalary=document.getElementById("warningSalary");
const warningRent=document.getElementById("warningRent");

function toBanglaNumber(input){
  const num=parseInt(input)||0;
  const banglaDigits='০১২৩৪৫৬৭৮৯';
  return String(num).replace(/\d/g,d=>banglaDigits[d]);
}

loadBtn.onclick=loadMonthData;

function loadMonthData(){
  const val=monthInput.value;
  if(!val){ alert("মাস নির্বাচন করুন"); return; }
  const [year,month]=val.split("-");
  reportBody.innerHTML="<tr><td colspan='4'>লোড হচ্ছে...</td></tr>";

  onValue(ref(db,"ledgers"),snap=>{
    const rows=[];
    let total=0,ti=0,te=0,ts=0,tr=0;
    snap.forEach(daySnap=>{
      const date=daySnap.key;
      if(date.startsWith(val)){
        daySnap.forEach(entry=>{
          const d=entry.val();
          let style="";
          if(d.type==="staff_salary") style="text-staff";
          if(d.type==="shop_rent") style="text-rent";
          rows.push(`<tr>
            <td>${date}</td>
            <td class="${style}">${d.name}</td>
            <td>${toBanglaNumber(d.amount)}</td>
            <td>${d.type}</td>
          </tr>`);
          total+=d.amount;
          if(d.type==="income") ti+=d.amount;
          if(d.type==="expense") te+=d.amount;
          if(d.type==="staff_salary") ts+=d.amount;
          if(d.type==="shop_rent") tr+=d.amount;
        });
      }
    });
    reportBody.innerHTML=rows.join("")||"<tr><td colspan='4'>কোনো এন্ট্রি নেই</td></tr>";
    totalAmount.innerText=toBanglaNumber(total);
    monthIncome.innerText=toBanglaNumber(ti);
    monthExpense.innerText=toBanglaNumber(te);
    monthSalary.innerText=toBanglaNumber(ts);
    monthRent.innerText=toBanglaNumber(tr);
    monthProfit.innerText=toBanglaNumber(ti-te);

    // Warning for dues
    warningSalary.innerText = ts===0?"স্টাফ বেতন বকেয়া নেই":"⚠️ স্টাফ বেতন বকেয়া আছে!";
    warningRent.innerText = tr===0?"দোকান ভাড়া বকেয়া নেই":"⚠️ দোকান ভাড়া বকেয়া আছে!";
  });
}

// CSV Export
exportBtn.onclick=()=>{
  const val=monthInput.value;
  if(!val){ alert("মাস নির্বাচন করুন"); return; }
  const rows=[['Date','Name','Amount','Type']];
  onValue(ref(db,"ledgers"),snap=>{
    snap.forEach(daySnap=>{
      const date=daySnap.key;
      if(date.startsWith(val)){
        daySnap.forEach(entry=>{
          const d=entry.val();
          rows.push([date,d.name,d.amount,d.type]);
        });
      }
    });
    const csvContent="data:text/csv;charset=utf-8,"+rows.map(e=>e.join(",")).join("\n");
    const link=document.createElement("a"); link.href=encodeURI(csvContent);
    link.download="monthly_report_"+val+".csv"; document.body.appendChild(link); link.click(); document.body.removeChild(link);
  },{once:true});
};
</script>

</body>
</html>
