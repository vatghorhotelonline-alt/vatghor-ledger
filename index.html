<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ভাতঘর হোটেল ডেইলি লেজার</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
body{font-family:'Hind Siliguri',sans-serif;}
.item-row:hover .action-btns{opacity:1}
</style>
</head>

<body class="bg-slate-200 p-3">

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 bg-black/70 flex items-center justify-center">
<div class="bg-white p-6 rounded-xl text-center w-72">

<h2 class="text-xl font-bold text-red-600">ভাতঘর হোটেল</h2>

<p class="text-sm mb-3">লগইন PIN</p>

<input id="pinInput" type="password" maxlength="4"
class="border w-full p-2 text-center text-lg mb-3 rounded">

<button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">
লগইন
</button>

<p id="loginError" class="text-red-500 text-sm mt-2 hidden">
ভুল PIN
</p>

</div>
</div>

<div id="app" class="hidden max-w-4xl mx-auto bg-white shadow-xl">

<!-- HEADER -->
<div class="p-4 border-b text-center">

<h1 class="text-2xl font-bold text-red-700">
ভাত ঘর হোটেল রেস্টুরেন্ট এন্ড মিষ্টান্ন
</h1>

<p id="todayDate" class="text-sm"></p>

</div>

<!-- ENTRY -->
<div class="p-3 bg-slate-50 flex flex-wrap gap-2">

<input id="itemName" list="staffList"
placeholder="বিবরণ / স্টাফ নাম"
class="border p-2 rounded flex-1">

<datalist id="staffList"></datalist>

<input id="amount" placeholder="টাকা"
class="border p-2 rounded w-24">

<select id="type" class="border p-2 rounded">

<option value="income">নগদ বিক্রয়</option>

<option value="expense">খরচ</option>

<option value="staff_salary">স্টাফ বেতন</option>

<option value="shop_rent">দোকান ভাড়া</option>

</select>

<input type="date" id="entryDate"
class="border p-2 rounded">

<button onclick="addItem()"
class="bg-blue-600 text-white px-4 rounded">
যোগ
</button>

</div>

<!-- QUICK POS -->
<div class="p-3 bg-gray-100 border-t">

<h3 class="font-bold mb-2 text-sm">
দ্রুত বিক্রি
</h3>

<div class="grid grid-cols-3 gap-2">

<button onclick="quickSale('ভাত',20)"
class="bg-green-500 text-white p-2 rounded">
🍚 ভাত ২০
</button>

<button onclick="quickSale('মাছ',60)"
class="bg-green-600 text-white p-2 rounded">
🐟 মাছ ৬০
</button>

<button onclick="quickSale('মাংস',120)"
class="bg-green-700 text-white p-2 rounded">
🍗 মাংস ১২০
</button>

<button onclick="quickSale('ডাল',20)"
class="bg-green-500 text-white p-2 rounded">
🥣 ডাল ২০
</button>

<button onclick="quickSale('সবজি',30)"
class="bg-green-600 text-white p-2 rounded">
🥬 সবজি ৩০
</button>

<button onclick="quickSale('পানি',10)"
class="bg-green-700 text-white p-2 rounded">
🥤 পানি ১০
</button>

</div>
</div>

<!-- LEDGER -->
<div id="ledgerList" class="divide-y"></div>

<!-- TOTAL -->
<div class="grid grid-cols-2 bg-black text-white text-center p-3">

<div>
<p class="text-xs">মোট আয়</p>
<p id="totalIncome" class="text-xl">৳ ০</p>
</div>

<div>
<p class="text-xs">মোট ব্যয়</p>
<p id="totalExpense" class="text-xl">৳ ০</p>
</div>

</div>

</div>

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import {getDatabase,ref,push,onValue,remove,set}
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",
authDomain:"vatghor-ledger-81366.firebaseapp.com",
databaseURL:"https://vatghor-ledger-81366-default-rtdb.firebaseio.com",
projectId:"vatghor-ledger-81366",
storageBucket:"vatghor-ledger-81366.appspot.com",
messagingSenderId:"639005808868",
appId:"1:639005808868:web:aa77be07aaa0264fd8f4f1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LOGIN_PIN="3481";
const DELETE_PIN="8019";

window.login=function(){

if(pinInput.value===LOGIN_PIN){

loginOverlay.style.display="none";
app.style.display="block";

loadData();
loadStaff();

}else{

loginError.classList.remove("hidden");

}

};

todayDate.innerText=new Date().toLocaleDateString("bn-BD");

function today(){

const d=document.getElementById("entryDate").value;

return d || new Date().toISOString().split("T")[0];

}

window.quickSale=async function(name,price){

await push(ref(db,"ledgers/"+today()),{

name:name,
amount:price,
type:"income",
time:Date.now()

});

};

window.addItem=async function(){

const name=itemName.value.trim();
const amt=parseFloat(amount.value);
const type=type.value;

if(!name||!amt) return;

await push(ref(db,"ledgers/"+today()),{

name:name,
amount:amt,
type:type,
time:Date.now()

});

if(type==="staff_salary"){

await set(ref(db,"staffs/"+name),true);

}

itemName.value="";
amount.value="";

};

window.deleteItem=function(id){

const pin=prompt("ডিলেট PIN");

if(pin!==DELETE_PIN){

alert("ভুল PIN");
return;

}

remove(ref(db,"ledgers/"+today()+"/"+id));

};

function loadStaff(){

onValue(ref(db,"staffs"),snap=>{

staffList.innerHTML="";

snap.forEach(c=>{

const o=document.createElement("option");

o.value=c.key;

staffList.appendChild(o);

});

});

}

function loadData(){

onValue(ref(db,"ledgers/"+today()),snap=>{

ledgerList.innerHTML="";

let inc=0;
let exp=0;

snap.forEach(c=>{

const d=c.val();
const id=c.key;

let style="";
let icon="";

if(d.type==="income"){style="text-green-700";icon="💰";inc+=d.amount;}

if(d.type==="expense"){style="text-red-600";icon="💸";exp+=d.amount;}

if(d.type==="staff_salary"){style="text-blue-700 bg-blue-100 px-2 rounded";icon="👤";exp+=d.amount;}

if(d.type==="shop_rent"){style="text-purple-700 bg-purple-100 px-2 rounded";icon="🏠";exp+=d.amount;}

const row=document.createElement("div");

row.className="item-row flex justify-between p-2";

row.innerHTML=`

<span class="${style}">
${icon} ${d.name}
</span>

<span>

৳ ${d.amount}

<span class="action-btns opacity-0 ml-2">

<button onclick="deleteItem('${id}')">❌</button>

</span>

</span>

`;

ledgerList.prepend(row);

});

totalIncome.innerText="৳ "+inc;
totalExpense.innerText="৳ "+exp;

});

}

</script>

</body>
</html>
