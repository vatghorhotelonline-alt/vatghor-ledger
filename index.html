<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভাতঘর হোটেল - দৈনিক হিসাব</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
body{font-family:'Hind Siliguri',sans-serif;}
.item-row:hover .delete-btn{opacity:1;}
</style>
</head>
<body class="bg-slate-200 p-2 sm:p-6">

<div id="loginOverlay" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50">
<div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center">
<h2 class="text-2xl font-black text-red-700 mb-2">ভাত ঘর হোটেল</h2>
<p class="text-slate-500 text-sm mb-6 font-semibold">প্রবেশ কোড দিন (৪ ডিজিট)</p>
<input id="pinInput" type="password" maxlength="4" placeholder="••••" class="w-full text-center text-3xl tracking-[1rem] font-bold border-2 border-slate-200 rounded-xl p-4 mb-4" />
<button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition">প্রবেশ করুন</button>
<p id="loginError" class="text-red-500 text-sm mt-4 hidden">ভুল কোড! আবার চেষ্টা করুন।</p>
</div>
</div>

<div id="mainApp" class="max-w-4xl mx-auto bg-white shadow-2xl rounded-sm border-t-8 border-red-600 overflow-hidden hidden opacity-0 transition-opacity duration-500">

<div class="p-4 sm:p-6 text-center border-b border-gray-300">
<h1 class="text-2xl sm:text-3xl font-black text-red-700 mt-1">ভাত ঘর হোটেল রেস্টুরেন্ট এন্ড মিষ্টান্ন</h1>
<p class="text-xs sm:text-sm font-medium">মাইজদীকোর্ট, নোয়াখালী।</p>
<div class="flex justify-between mt-4 text-xs sm:text-sm font-bold border-t pt-2">
<div>তারিখ: <span id="currentDate"></span></div>
<div>বার: <span id="currentDay"></span></div>
</div>
</div>

<div class="p-3 sm:p-4 bg-slate-50 border-b flex flex-wrap gap-2 items-end justify-center no-print">
<div class="flex-1 min-w-[150px]">
<label class="block text-[11px] font-bold mb-1">তারিখ</label>
<input type="date" id="entryDate" class="w-full border p-2 text-sm rounded" />
</div>
<div class="flex-1 min-w-[150px]">
<label class="block text-[11px] font-bold mb-1">আইটেম/বিবরণ</label>
<input id="itemName" type="text" placeholder="বিবরণ দিন" class="w-full border p-2 text-sm rounded" />
</div>
<div class="w-24">
<label class="block text-[11px] font-bold mb-1">টাকা</label>
<input id="amount" type="number" placeholder="০" class="w-full border p-2 text-sm rounded" />
</div>
<div class="w-40">
<label class="block text-[11px] font-bold mb-1">ধরণ</label>
<select id="type" class="w-full border p-2 text-sm rounded">
<option value="income">নগদ বিক্রয় (জমা)</option>
<option value="expense">নগদ খরচ (ব্যয়)</option>
<option value="staff_salary">স্টাফ বেতন</option>
<option value="shop_rent">দোকান ভাড়া</option>
<option value="due_income">বাকী বিক্রি (পাওনা)</option>
<option value="due_expense">বাকী ক্রয় (দেনা)</option>
</select>
</div>
<button id="addBtn" class="bg-blue-600 text-white px-6 py-2 text-sm font-bold hover:bg-blue-700 transition rounded">যোগ করুন</button>
</div>

<div id="incomeList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js"></script>
<script>
const firebaseConfig={
apiKey:"AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",
authDomain:"vatghor-ledger-81366.firebaseapp.com",
databaseURL:"https://vatghor-ledger-81366-default-rtdb.firebaseio.com",
projectId:"vatghor-ledger-81366",
storageBucket:"vatghor-ledger-81366.appspot.com",
messagingSenderId:"639005808868",
appId:"1:639005808868:web:aa77be07aaa0264fd8f4f1"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

document.getElementById('currentDate').innerText=new Date().toLocaleDateString('bn-BD');
document.getElementById('currentDay').innerText=new Date().toLocaleDateString('bn-BD',{weekday:'long'});

const PIN_CODE='3481';
const pinInput=document.getElementById('pinInput');
const loginBtn=document.getElementById('loginBtn');
loginBtn.onclick=()=>{
if(pinInput.value===PIN_CODE){
document.getElementById('loginOverlay').classList.add('hidden');
document.getElementById('mainApp').classList.remove('hidden');
setTimeout(()=>document.getElementById('mainApp').classList.add('opacity-100'),50);
}else{
document.getElementById('loginError').classList.remove('hidden');
}
};

document.getElementById('addBtn').onclick=async()=>{
const name=document.getElementById('itemName').value;
const amt=parseFloat(document.getElementById('amount').value);
const type=document.getElementById('type').value;
const selectedDate=document.getElementById('entryDate').value;
const todayStr=selectedDate || new Date().toISOString().split('T')[0];

if(name && !isNaN(amt)){
const dbRef=firebase.database().ref('ledgers/'+todayStr);
await dbRef.push({name,amount:amt,type,timestamp:Date.now()});
document.getElementById('itemName').value='';
document.getElementById('amount').value='';
document.getElementById('itemName').focus();
alert("Entry added successfully ✅\nDate: "+todayStr);
}
};
</script>
</body>
</html>
