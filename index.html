<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ভাত ঘর হোটেল লেজার</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Hind Siliguri',sans-serif;
}

.item:hover .btns{
opacity:1;
}

.btns{
opacity:0;
}

.blue{
color:#0284c7;
font-weight:bold;
}

.purple{
color:#7c3aed;
font-weight:bold;
}

.orange{
color:#ea580c;
font-weight:bold;
}

.darkgreen{
color:#065f46;
font-weight:bold;
}

</style>

</head>

<body class="bg-slate-200 p-3">

<!-- LOGIN -->

<div id="login" class="fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-white p-8 rounded-xl text-center w-80">

<h1 class="text-xl font-black text-red-700 mb-3">
ভাত ঘর হোটেল লেজার
</h1>

<input id="pin"
type="password"
placeholder="প্রবেশ কোড"
class="border p-3 w-full text-center text-xl rounded mb-3">

<button onclick="login()"
class="bg-blue-600 text-white w-full py-2 rounded">
প্রবেশ
</button>

</div>

</div>

<div id="app" class="max-w-4xl mx-auto bg-white shadow-xl hidden">

<!-- HEADER -->

<div class="p-4 text-center border-b">

<h1 class="text-2xl font-black text-red-700">
ভাত ঘর হোটেল রেস্টুরেন্ট এন্ড মিষ্টান্ন
</h1>

<p id="today" class="text-sm mt-1"></p>

</div>

<!-- ACTION -->

<div class="flex gap-2 p-3 bg-slate-100">

<input id="name"
placeholder="বিবরণ / স্টাফ নাম"
class="border p-2 rounded flex-1">

<input id="money"
placeholder="টাকা"
class="border p-2 rounded w-32">

<select id="type" class="border p-2 rounded">

<option value="income">নগদ বিক্রয়</option>

<option value="expense">নগদ খরচ</option>

<option value="staff">স্টাফ বেতন</option>

<option value="rent">দোকান ভাড়া</option>

<option value="credit_buy">বাকিতে মাল ক্রয়</option>

<option value="credit_sell">বাকিতে বিক্রি</option>

</select>

<button onclick="add()"
class="bg-blue-600 text-white px-4 rounded">
যোগ
</button>

</div>

<!-- LIST -->

<div class="grid grid-cols-2">

<div>

<div class="bg-green-100 text-center p-2 font-bold">
জমা
</div>

<div id="income"></div>

</div>

<div>

<div class="bg-red-100 text-center p-2 font-bold">
ব্যয়
</div>

<div id="expense"></div>

</div>

</div>

<!-- TOTAL -->

<div class="grid grid-cols-3 text-center bg-slate-900 text-white p-4">

<div>

<p class="text-xs">মোট বিক্রয়</p>

<p id="tincome" class="font-bold text-green-400">
0
</p>

</div>

<div>

<p class="text-xs">মোট ব্যয়</p>

<p id="texpense" class="font-bold text-red-400">
0
</p>

</div>

<div>

<p class="text-xs">লাভ</p>

<p id="profit" class="font-bold text-yellow-400">
0
</p>

</div>

</div>

<canvas id="chart" class="p-4"></canvas>

</div>

<script type="module">

import{initializeApp}
from"https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import{
getDatabase,
ref,
push,
onValue,
remove
}
from"https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",

authDomain:"vatghor-ledger-81366.firebaseapp.com",

databaseURL:"https://vatghor-ledger-81366-default-rtdb.firebaseio.com",

projectId:"vatghor-ledger-81366",

storageBucket:"vatghor-ledger-81366.appspot.com",

messagingSenderId:"639005808868",

appId:"1:639005808868:web:aa77be07aaa0264fd8f4f1"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const PIN="3481";

const DELETE_PIN="8019";

function login(){

if(document.getElementById("pin").value===PIN){

login.style.display="none";

appDiv.classList.remove("hidden");

load();

}

}

window.login=login;

const appDiv=document.getElementById("app");

today.innerText=new Date().toLocaleDateString("bn-BD");

function add(){

const n=name.value;

const m=parseFloat(money.value);

const t=type.value;

if(!n||!m)return;

push(ref(db,"ledger"),{

name:n,

amount:m,

type:t,

time:Date.now()

});

name.value="";

money.value="";

}

window.add=add;

function load(){

onValue(ref(db,"ledger"),snap=>{

let ti=0;

let te=0;

let html1="";

let html2="";

snap.forEach(c=>{

const d=c.val();

const id=c.key;

let style="";

if(d.type==="staff")style="blue";

if(d.type==="rent")style="purple";

if(d.type==="credit_buy")style="orange";

if(d.type==="credit_sell")style="darkgreen";

const row=

`<div class="flex justify-between border-b p-2 item">

<span class="${style}">
${d.name}
</span>

<span class="${style}">

৳ ${d.amount}

<span class="btns ml-2">

<button onclick="del('${id}')">
❌
</button>

</span>

</span>

</div>`;

if(
d.type==="income"||
d.type==="credit_sell"
){

ti+=d.amount;

html1+=row;

}else{

te+=d.amount;

html2+=row;

}

});

income.innerHTML=html1;

expense.innerHTML=html2;

tincome.innerText=ti;

texpense.innerText=te;

profit.innerText=ti-te;

draw(ti,te);

});

}

function del(id){

const p=prompt("Delete PIN");

if(p!==DELETE_PIN)return;

remove(ref(db,"ledger/"+id));

}

window.del=del;

let chart;

function draw(i,e){

const ctx=document.getElementById("chart");

if(chart)chart.destroy();

chart=new Chart(ctx,{

type:"bar",

data:{

labels:["Income","Expense"],

datasets:[{

data:[i,e]

}]

}

});

}

</script>

</body>

</html>
