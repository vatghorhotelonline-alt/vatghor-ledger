<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ভাতঘর হোটেল দৈনিক হিসাব</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Hind Siliguri',sans-serif; }
@media print { .no-print { display:none!important; } }
#loginOverlay { backdrop-filter:blur(8px); }
.item-row:hover .action-btns { opacity:1; }
</style>
</head>
<body class="bg-slate-200 min-h-screen p-3">

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-xl shadow-xl w-80 text-center">
    <h2 class="text-2xl font-black text-red-700 mb-2">ভাতঘর হোটেল</h2>
    <p class="text-sm mb-4">প্রবেশ কোড দিন</p>
    <input id="pinInput" type="password" maxlength="4" class="w-full border p-3 text-center text-3xl rounded mb-4">
    <button id="loginBtn" class="bg-blue-600 text-white w-full py-3 rounded font-bold">প্রবেশ করুন</button>
    <p id="loginError" class="text-red-500 text-sm mt-3 hidden">ভুল কোড</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="max-w-3xl mx-auto bg-white shadow-xl hidden">

<!-- HEADER -->
<div class="p-4 border-b text-center">
  <h1 class="text-2xl font-black text-red-700">ভাতঘর হোটেল রেস্টুরেন্ট এন্ড মিষ্টান্ন</h1>
  <p class="text-sm">মাইজদীকোর্ট, নোয়াখালী</p>
  <div class="flex justify-between mt-3 text-sm font-bold">
    <div>তারিখ: <span id="currentDate"></span></div>
    <div>বার: <span id="currentDay"></span></div>
  </div>
</div>

<!-- ACTION BAR -->
<div class="p-3 flex justify-between bg-slate-100 no-print">
  <button onclick="window.print()" class="bg-slate-700 text-white px-3 py-1 rounded">প্রিন্ট</button>
  <button id="logoutBtn" class="bg-red-600 text-white px-3 py-1 rounded">লগআউট</button>
</div>

<!-- ADD ITEM -->
<div class="p-3 flex flex-wrap gap-2 border-b bg-slate-50 no-print">
  <input id="itemName" placeholder="বিবরণ" class="border p-2 rounded flex-1">
  <input id="amount" type="number" placeholder="টাকা" class="border p-2 rounded w-24">
  <select id="type" class="border p-2 rounded">
    <option value="income">নগদ বিক্রয়</option>
    <option value="expense">নগদ খরচ</option>
    <option value="due_income">বাকী পাওনা</option>
    <option value="due_expense">বাকী দেনা</option>
  </select>
  <button id="addBtn" class="bg-blue-600 text-white px-4 rounded">যোগ</button>
</div>

<!-- LIST -->
<div class="grid grid-cols-2">
  <div>
    <div class="bg-green-100 text-center p-2 font-bold">জমা / পাওনা</div>
    <div id="incomeList"></div>
  </div>
  <div>
    <div class="bg-red-100 text-center p-2 font-bold">ব্যয় / দেনা</div>
    <div id="expenseList"></div>
  </div>
</div>

<!-- TOTALS -->
<div class="grid grid-cols-2 text-center bg-slate-800 text-white p-4">
  <div><p class="text-xs">মোট বিক্রয়</p><p id="totalInc" class="text-lg font-bold">0</p></div>
  <div><p class="text-xs">মোট খরচ</p><p id="totalExp" class="text-lg font-bold">0</p></div>
</div>

<div class="grid grid-cols-2 text-center bg-slate-900 text-white p-4">
  <div><p class="text-xs">সাবেক ক্যাশ</p><p id="openingBalance" class="text-lg text-blue-400 font-bold">0</p></div>
  <div><p class="text-xs">আজকের লাভ</p><p id="profitTotal" class="text-lg text-green-400 font-bold">0</p></div>
</div>

<div class="bg-black text-yellow-400 text-center p-4">
  <p class="text-xs">বর্তমানে মোট ক্যাশ</p>
  <p id="grandTotal" class="text-2xl font-black">0</p>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {getDatabase,ref,push,set,onValue,remove} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",
  authDomain:"vatghor-ledger-81366.firebaseapp.com",
  databaseURL:"https://vatghor-ledger-81366-default-rtdb.firebaseio.com",
  projectId:"vatghor-ledger-81366",
  storageBucket:"vatghor-ledger-81366.appspot.com",
  messagingSenderId:"639005808868",
  appId:"1:639005808868:web:aa77be07aaa0264fd8f4f1"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const PIN="3481";
let attempts=0;

loginBtn.onclick=()=>{
  if(attempts>=5){ alert("অনেকবার ভুল কোড দিয়েছেন"); return; }
  if(pinInput.value===PIN){
    loginOverlay.style.display="none";
    mainApp.classList.remove("hidden");
    loadData();
  }else{
    attempts++;
    loginError.classList.remove("hidden");
  }
};

logoutBtn.onclick=()=>location.reload();

currentDate.innerText=new Date().toLocaleDateString("bn-BD");
currentDay.innerText=new Date().toLocaleDateString("bn-BD",{weekday:"long"});

let adding=false;
addBtn.onclick=addItem;

amount.addEventListener("keypress",e=>{ if(e.key==="Enter") addItem(); });
itemName.addEventListener("keypress",e=>{ if(e.key==="Enter") addItem(); });

async function addItem(){
  if(adding) return;
  const name=itemName.value;
  const amt=parseFloat(amount.value);
  const typeSelect=document.getElementById("type").value;
  if(!name||isNaN(amt)) return;
  adding=true;
  const today=new Date().toISOString().split("T")[0];
  await push(ref(db,"ledgers/"+today),{
    name, amount:amt, type:typeSelect, time:Date.now()
  });
  itemName.value=""; amount.value="";
  adding=false;
}

window.deleteItem=id=>{
  const pin=prompt("আইটেম মুছতে PIN দিন");
  if(pin!==PIN){ alert("ভুল PIN"); return; }
  if(!confirm("নিশ্চিতভাবে মুছে ফেলবেন?")) return;
  const today=new Date().toISOString().split("T")[0];
  remove(ref(db,"ledgers/"+today+"/"+id));
};

window.editItem=(id,name,amount,type)=>{
  const newName=prompt("বিবরণ পরিবর্তন করুন",name);
  const newAmount=prompt("টাকা পরিবর্তন করুন",amount);
  if(!newName||!newAmount) return;
  const today=new Date().toISOString().split("T")[0];
  set(ref(db,"ledgers/"+today+"/"+id),{ name:newName, amount:parseFloat(newAmount), type, time:Date.now() });
};

function loadData(){
  const today=new Date();
  const todayStr=today.toISOString().split("T")[0];
  const y=new Date(today); y.setDate(y.getDate()-1);
  const yStr=y.toISOString().split("T")[0];
  let openingCash=0;

  // গতকালের ক্যাশ
  onValue(ref(db,"ledgers/"+yStr),snap=>{
    let ti=0, te=0;
    snap.forEach(c=>{ const d=c.val(); if(d.type==="income") ti+=d.amount; if(d.type==="expense") te+=d.amount; });
    openingCash=ti-te;
    openingBalance.innerText=openingCash;
  });

  // আজকের ডাটা
  onValue(ref(db,"ledgers/"+todayStr),snap=>{
    let ti=0, te=0;
    let incomeHtml="", expenseHtml="";
    snap.forEach(c=>{
      const d=c.val(), id=c.key;
      if(d.type==="income") ti+=d.amount;
      if(d.type==="expense") te+=d.amount;
      const row=`
      <div class="flex justify-between p-2 border-b item-row">
        <span>${d.name}</span>
        <span>৳ ${d.amount} 
          <span class="action-btns opacity-0 ml-2">
            <button onclick="editItem('${id}','${d.name}','${d.amount}','${d.type}')">✏️</button>
            <button onclick="deleteItem('${id}')">❌</button>
          </span>
        </span>
      </div>`;
      if(d.type.includes("income")) incomeHtml+=row;
      else expenseHtml+=row;
    });
    incomeList.innerHTML=incomeHtml||"<p class='p-3 text-center text-gray-400'>কিছু নেই</p>";
    expenseList.innerHTML=expenseHtml||"<p class='p-3 text-center text-gray-400'>কিছু নেই</p>";
    totalInc.innerText=ti;
    totalExp.innerText=te;
    const profit=ti-te;
    profitTotal.innerText=profit;
    grandTotal.innerText=openingCash+profit;
  });
}
</script>

</body>
</html>
