<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ভাতঘর হোটেল - দৈনিক হিসাব</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; }
    @media print { .no-print { display: none !important; } }
    #loginOverlay { backdrop-filter: blur(8px); }
    .item-row:hover .delete-btn { opacity: 1; }
  </style>
</head>
<body class="bg-slate-200 min-h-screen p-2 sm:p-6">

  <div id="loginOverlay" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center">
      <h2 class="text-2xl font-black text-red-700 mb-2">ভাতঘর হোটেল</h2>
      <p class="text-slate-500 text-sm mb-6 font-semibold">প্রবেশ কোড দিন (৪ ডিজিট)</p>
      <input id="pinInput" type="password" maxlength="4" inputmode="numeric" placeholder="••••"
             class="w-full text-center text-3xl tracking-[1rem] font-bold border-2 border-slate-200 rounded-xl p-4 mb-4 focus:border-blue-500 focus:outline-none transition">
      <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition">প্রবেশ করুন</button>
      <p id="loginError" class="text-red-500 text-sm mt-4 hidden">ভুল কোড! আবার চেষ্টা করুন।</p>
    </div>
  </div>

  <div id="mainApp" class="max-w-4xl mx-auto bg-white shadow-2xl rounded-sm border-t-8 border-red-600 overflow-hidden hidden opacity-0 transition-opacity duration-500">
    <div class="p-4 sm:p-6 text-center border-b border-gray-300">
      <p class="text-xs font-semibold">বিসমিল্লাহির রাহমানির রাহিম</p>
      <h1 class="text-2xl sm:text-3xl font-black text-red-700 mt-1">ভাতঘর হোটেল রেস্টুরেন্ট</h1>
      <p class="text-xs sm:text-sm font-medium">মাইজদীকোর্ট, নোয়াখালী।</p>
      <div class="flex justify-between mt-4 text-xs sm:text-sm font-bold border-t pt-2">
        <div>তারিখ: <span id="currentDate"></span></div>
        <div>বার: <span id="currentDay"></span></div>
      </div>
    </div>

    <div class="p-3 sm:p-4 bg-slate-50 border-b flex items-center justify-between gap-2 no-print">
      <div class="text-xs font-semibold text-slate-600">দৈনিক হিসাব</div>
      <div class="flex gap-2">
        <button onclick="window.print()" class="px-3 py-1.5 text-xs bg-slate-700 text-white rounded hover:bg-slate-800 transition">🖨️ প্রিন্ট</button>
        <button id="logoutBtn" class="px-3 py-1.5 text-xs bg-red-600 text-white rounded hover:bg-red-700 transition">🚪 লগআউট</button>
      </div>
    </div>

    <div class="p-3 sm:p-4 bg-slate-50 border-b flex flex-wrap gap-2 items-end justify-center no-print">
      <div class="flex-1 min-w-[150px]">
        <label class="block text-[11px] font-bold mb-1">আইটেম/বিবরণ</label>
        <input id="itemName" type="text" placeholder="বিবরণ দিন" class="w-full border p-2 text-sm rounded outline-none focus:ring-1 focus:ring-blue-500" />
      </div>
      <div class="w-24">
        <label class="block text-[11px] font-bold mb-1">টাকা</label>
        <input id="amount" type="number" inputmode="decimal" placeholder="০" class="w-full border p-2 text-sm rounded outline-none" />
      </div>
      <div class="w-40">
        <label class="block text-[11px] font-bold mb-1">ধরণ</label>
        <select id="type" class="w-full border p-2 text-sm bg-white rounded">
          <option value="income">নগদ বিক্রয় (জমা)</option>
          <option value="expense">নগদ খরচ (ব্যয়)</option>
          <option value="due_income">বাকী বিক্রি (পাওনা)</option>
          <option value="due_expense">বাকী ক্রয় (দেনা)</option>
        </select>
      </div>
      <button id="addBtn" class="bg-blue-600 text-white px-6 py-2 text-sm font-bold hover:bg-blue-700 transition rounded">যোগ করুন</button>
    </div>

    <div class="flex flex-col md:flex-row min-h-[320px]">
      <div class="flex-1 border-b md:border-b-0 md:border-r border-slate-200">
        <div class="bg-green-100 p-2 text-center font-bold border-b text-xs text-green-800">জমা ও পাওনা</div>
        <div id="incomeList" class="divide-y divide-slate-100 text-xs"></div>
      </div>
      <div class="flex-1">
        <div class="bg-red-100 p-2 text-center font-bold border-b text-xs text-red-800">ব্যয় ও দেনা</div>
        <div id="expenseList" class="divide-y divide-slate-100 text-xs"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 bg-slate-800 text-white font-bold p-4 text-center text-[10px] gap-y-4">
      <div class="border-r border-slate-600"><p class="opacity-75">নগদ বিক্রয়</p><p id="totalInc">৳ ০</p></div>
      <div class="md:border-r border-slate-600"><p class="opacity-75">নগদ খরচ</p><p id="totalExp">৳ ০</p></div>
      <div class="border-r border-slate-600"><p class="opacity-75 text-yellow-400">বাকী পাওনা</p><p id="totalDueInc" class="text-yellow-400">৳ ০</p></div>
      <div><p class="opacity-75 text-orange-400">বাকী দেনা</p><p id="totalDueExp" class="text-orange-400">৳ ০</p></div>
    </div>
    
    <div class="bg-slate-900 text-white p-4 border-t border-slate-700 text-center">
       <p class="text-xs opacity-75">আজকের ক্যাশ ড্রয়ারে থাকার কথা</p>
       <p class="text-2xl font-black text-green-400">৳ <span id="netTotal">০</span></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoZQQfywLU21JgrxXK82PYRQE2eKUwND4",
      authDomain: "vatghor-ledger-81366.firebaseapp.com",
      databaseURL: "https://vatghor-ledger-81366-default-rtdb.firebaseio.com",
      projectId: "vatghor-ledger-81366",
      storageBucket: "vatghor-ledger-81366.firebasestorage.app",
      messagingSenderId: "639005808868",
      appId: "1:639005808868:web:aa77be07aaa0264fd8f4f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const PIN_CODE = '1234';
    const pinInput = document.getElementById('pinInput');
    const loginBtn = document.getElementById('loginBtn');

    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD');
    document.getElementById('currentDay').innerText = new Date().toLocaleDateString('bn-BD', { weekday: 'long' });

    loginBtn.onclick = () => {
      if (pinInput.value === PIN_CODE) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        setTimeout(() => document.getElementById('mainApp').classList.add('opacity-100'), 50);
        loadData();
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
    };

    document.getElementById('logoutBtn').onclick = () => location.reload();

    document.getElementById('addBtn').onclick = async () => {
      const name = document.getElementById('itemName').value;
      const amt = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      const today = new Date().toISOString().split('T')[0];

      if (name && !isNaN(amt)) {
        const dbRef = ref(db, 'ledgers/' + today);
        const newRef = push(dbRef);
        await set(newRef, { name, amount: amt, type, timestamp: Date.now() });
        document.getElementById('itemName').value = '';
        document.getElementById('amount').value = '';
      }
    };

    window.deleteItem = (id) => {
      if (confirm('মুছে ফেলতে চান?')) {
        const today = new Date().toISOString().split('T')[0];
        remove(ref(db, `ledgers/${today}/${id}`));
      }
    };

    function loadData() {
      const today = new Date().toISOString().split('T')[0];
      onValue(ref(db, 'ledgers/' + today), (snap) => {
        let iHtml = '', eHtml = '', ti = 0, te = 0, tdi = 0, tde = 0;
        snap.forEach(child => {
          const d = child.val();
          const id = child.key;
          
          if(d.type === 'income') ti += d.amount;
          else if(d.type === 'expense') te += d.amount;
          else if(d.type === 'due_income') tdi += d.amount;
          else if(d.type === 'due_expense') tde += d.amount;

          const row = `
            <div class="item-row flex justify-between p-3 group">
              <span>${d.name} ${d.type.includes('due') ? '<small>(বাকী)</small>' : ''}</span>
              <div class="flex items-center gap-2">
                <span class="font-bold">৳ ${d.amount}</span>
                <button onclick="deleteItem('${id}')" class="text-red-500 no-print">❌</button>
              </div>
            </div>`;
          (d.type.includes('income') ? iHtml += row : eHtml += row);
        });

        document.getElementById('incomeList').innerHTML = iHtml || '<p class="p-4 text-center">নেই</p>';
        document.getElementById('expenseList').innerHTML = eHtml || '<p class="p-4 text-center">নেই</p>';
        document.getElementById('totalInc').innerText = '৳ ' + ti;
        document.getElementById('totalExp').innerText = '৳ ' + te;
        document.getElementById('totalDueInc').innerText = '৳ ' + tdi;
        document.getElementById('totalDueExp').innerText = '৳ ' + tde;
        document.getElementById('netTotal').innerText = (ti - te);
      });
    }
  </script>
</body>
</html>
